---
- name: Instalar Apache
  hosts: localhost
  become: yes
  connection: local

  tasks:

    - name: Instalar Apache
      apt:
        name: apache2
        state: present
        update_cache: yes

    - name: Cambiar puerto a 9999
      replace:
        path: /etc/apache2/ports.conf
        regexp: 'Listen 80'
        replace: 'Listen 9999'

    - name: Cambiar VirtualHost
      replace:
        path: /etc/apache2/sites-available/000-default.conf
        regexp: '<VirtualHost \*:80>'
        replace: '<VirtualHost *:9999>'

    - name: Reiniciar Apache
      service:
        name: apache2
        state: restarted
